<section class="section_admin">
    
<div id="panel_lateralOpc">
    <div id="informacion_usuario">
        <mat-icon class="icono-usuario">account_circle</mat-icon>
        <p>Maldonado dano</p>
        <button mat-raised-button (click)="cerrarSesion()">
            Cerrar sesión
        </button>
    </div>
    <div id="contenedor_opciones">
        <button 
        [ngClass]="{'activo': opcionSeleccionada === 'cursos'}" 
        (click)="seleccionar('cursos')">
        <mat-icon class="icono-libro">menu_book</mat-icon>
        Registrar estudiantes
        </button>

        <button 
        [ngClass]="{'activo': opcionSeleccionada === 'historial'}" 
        (click)="seleccionar('historial')">
        <mat-icon class="icono-historial">history_edu</mat-icon>
        Registrar cursos
        </button>

        <button 
        [ngClass]="{'activo': opcionSeleccionada === 'datos'}" 
        (click)="seleccionar('datos')">
        <mat-icon class="icono-datos">manage_accounts</mat-icon>
        Mis datos
        </button>
    </div>
</div>
<div id="panel_lateralCont">
    <div id="logo_cabecera">
        <img src="imagenes/logo-completo.png" alt="logo">
    </div>
    <div id="contendor_cur">
        <div id="contenedor_misCu"></div>
        <div id="contenedor_Inscr"></div>        
    </div>


</div>

</section>
